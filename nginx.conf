server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # 보안 헤더.
    # connect-src를 엄격히 제한하지 않는 이유: ICE 서버(STUN/TURN)가 백엔드에서 런타임에
    # 동적으로 내려오는 값이라 정확한 호스트를 빌드 시점에 알 수 없음 — 잘못 제한하면
    # WebRTC 연결 자체가 깨질 수 있어 이 항목만 의도적으로 넓게 둠.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; connect-src *" always;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite 빌드 산출물 — 파일명에 해시 포함 → 1년 캐시 (immutable)
    # 주의: 이 location에 add_header가 있으면 nginx는 server 블록의 add_header를
    # 상속하지 않으므로(자체 add_header가 하나라도 있으면 상속 무효화), 보안 헤더도
    # 여기서 다시 명시해야 한다.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; connect-src *" always;
    }

    gzip on;
    gzip_comp_level 6;
    gzip_vary on;        # Vary: Accept-Encoding — 프록시 캐시 분리 필요
    gzip_min_length 1024;
    gzip_types
        text/html
        text/css
        text/javascript
        application/javascript
        application/json
        application/wasm
        image/svg+xml
        font/woff2;
}
