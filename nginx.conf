server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite 빌드 산출물 — 파일명에 해시 포함 → 1년 캐시 (immutable)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_comp_level 6;
    gzip_vary on;        # Vary: Accept-Encoding — 프록시 캐시 분리 필요
    gzip_min_length 1024;
    gzip_types
        text/html
        text/css
        text/javascript
        application/javascript
        application/json
        application/wasm
        image/svg+xml
        font/woff2;
}
